<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de endereço</title>
    <link rel="stylesheet" href="style.css">
    <script src="fetchAPI.js" defer></script>
</head>
<body>
    <main>
        <button id="botaoTema">☀</button>
        <h2>Cadastro de Endereço</h2>
        <form>
            <label for="cep">CEP:</label>
            <input type="text" id="cep" maxlength="8" inputmode="numeric">

            <label for="logradouro">Logradouro:</label>
            <input type="text" id="logradouro" name="logradouro" required>

            <label for="bairro">Bairro:</label>
            <input type="text" id="bairro" name="bairro" required>

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" name="cidade" required>

            <label for="estado">Estado:</label>
            <input type="text" id="estado" name="estado" required>

            <label for="numero">Número:</label>
            <input type="number" id="numero" name="numero" required>

            <button class="buttonCadastrar" type="submit">Cadastrar</button>
        </form>
    </main>    
</body>
</html>
